  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b2351c20-8b91-45f3-8554-a30c876c0bb1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f289ee02-e0b3-4cae-80a9-d38654aaf6ac\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6db8e4ba-dfdd-49a1-a345-0f5b96a3a13b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b2351c20-8b91-45f3-8554-a30c876c0bb1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* =========================================\n   CAP — Consultoría Adaptable para Pymes\n   Modernist, minimal, blue-brand palette\n   ========================================= */\n\n:root {\n  --blue:       #1E0FB5;\n  --blue-deep:  #140A85;\n  --blue-dark:  #0A0550;\n  --blue-soft:  #EEEBFF;\n  --blue-tint:  #F6F4FF;\n  --ink:        #0E0E1A;\n  --ink-60:     #4A4A5C;\n  --ink-40:     #8989A0;\n  --line:       #E6E4F0;\n  --white:      #FFFFFF;\n  --bg-soft:    #F9F8FD;\n  --radius:     14px;\n  --radius-lg:  22px;\n  --shadow-sm:  0 2px 10px rgba(20, 10, 133, .06);\n  --shadow:     0 12px 40px rgba(20, 10, 133, .10);\n  --shadow-lg:  0 24px 60px rgba(20, 10, 133, .18);\n  --font-body:  'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-disp:  'Space Grotesk', 'Inter', sans-serif;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  font-family: var(--font-body);\n  color: var(--ink);\n  background: var(--white);\n  font-size: 16px;\n  line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\n\n.container {\n  max-width: 1200px;\n  margin: 0 auto;\n  padding: 0 24px;\n}\n\n/* =========================================\n   TYPOGRAPHY\n   ========================================= */\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-disp);\n  font-weight: 700;\n  letter-spacing: -0.02em;\n  line-height: 1.15;\n  color: var(--ink);\n}\nh1 { font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 700; }\nh2 { font-size: clamp(1.8rem, 3.6vw, 2.6rem); font-weight: 700; margin-bottom: 12px; }\nh3 { font-size: 1.35rem; margin-bottom: 10px; }\nh4 { font-size: 1.15rem; margin-bottom: 8px; }\nh5 { font-size: 1rem; margin-bottom: 6px; font-weight: 600; }\n\n.eyebrow {\n  display: inline-block;\n  font-size: 0.82rem;\n  font-weight: 600;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--blue);\n  margin-bottom: 14px;\n}\n.eyebrow.light { color: rgba(255, 255, 255, .85); }\n\n.accent { color: var(--blue); }\n\n/* =========================================\n   NAV\n   ========================================= */\n.nav {\n  position: fixed;\n  top: 0; left: 0; right: 0;\n  z-index: 100;\n  background: rgba(255, 255, 255, .85);\n  backdrop-filter: blur(18px);\n  -webkit-backdrop-filter: blur(18px);\n  border-bottom: 1px solid transparent;\n  transition: all .3s ease;\n}\n.nav.scrolled {\n  background: rgba(255, 255, 255, .95);\n  border-bottom-color: var(--line);\n  box-shadow: var(--shadow-sm);\n}\n.nav-inner {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  height: 76px;\n}\n.brand {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n}\n.brand-logo {\n  width: 42px;\n  height: 42px;\n  border-radius: 8px;\n  object-fit: cover;\n}\n.brand-text {\n  display: flex;\n  flex-direction: column;\n  line-height: 1.1;\n}\n.brand-text strong {\n  font-family: var(--font-disp);\n  font-size: 1.1rem;\n  color: var(--blue);\n  letter-spacing: -0.02em;\n}\n.brand-text em {\n  font-style: normal;\n  font-size: 0.72rem;\n  color: var(--ink-60);\n  letter-spacing: 0.02em;\n}\n.nav-links {\n  display: flex;\n  align-items: center;\n  gap: 32px;\n}\n.nav-links a {\n  font-size: 0.94rem;\n  font-weight: 500;\n  color: var(--ink);\n  transition: color .2s;\n}\n.nav-links a:hover { color: var(--blue); }\n.nav-cta {\n  background: var(--blue);\n  color: var(--white) !important;\n  padding: 10px 20px;\n  border-radius: 100px;\n  font-weight: 600 !important;\n  transition: all .25s;\n}\n.nav-cta:hover {\n  background: var(--blue-deep);\n  transform: translateY(-1px);\n}\n.nav-toggle {\n  display: none;\n  background: transparent;\n  border: 0;\n  width: 36px;\n  height: 36px;\n  cursor: pointer;\n  flex-direction: column;\n  justify-content: center;\n  gap: 5px;\n  padding: 6px;\n}\n.nav-toggle span {\n  display: block;\n  height: 2px;\n  background: var(--ink);\n  border-radius: 2px;\n}\n\n/* =========================================\n   HERO\n   ========================================= */\n.hero {\n  position: relative;\n  padding: 160px 0 100px;\n  overflow: hidden;\n  background: linear-gradient(180deg, var(--blue-tint) 0%, var(--white) 100%);\n}\n.hero-bg {\n  position: absolute;\n  top: -200px; right: -200px;\n  width: 700px; height: 700px;\n  background: radial-gradient(circle at center, rgba(30, 15, 181, .14), transparent 60%);\n  z-index: 0;\n}\n.hero-bg::after {\n  content: '';\n  position: absolute;\n  bottom: -400px; left: -400px;\n  width: 600px; height: 600px;\n  background: radial-gradient(circle at center, rgba(30, 15, 181, .08), transparent 70%);\n}\n.hero-inner {\n  position: relative;\n  z-index: 1;\n  display: grid;\n  grid-template-columns: 1.2fr 0.8fr;\n  gap: 60px;\n  align-items: center;\n}\n.hero-text h1 { margin-bottom: 24px; }\n.hero-text .lead {\n  font-size: 1.15rem;\n  color: var(--ink-60);\n  margin-bottom: 36px;\n  max-width: 560px;\n}\n.hero-ctas {\n  display: flex;\n  gap: 16px;\n  margin-bottom: 60px;\n  flex-wrap: wrap;\n}\n.hero-stats {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 24px;\n  max-width: 560px;\n}\n.hero-stats > div {\n  border-left: 2px solid var(--blue);\n  padding-left: 14px;\n}\n.hero-stats strong {\n  display: block;\n  font-family: var(--font-disp);\n  font-size: 1.6rem;\n  color: var(--blue);\n  font-weight: 700;\n}\n.hero-stats span {\n  font-size: 0.85rem;\n  color: var(--ink-60);\n}\n\n.hero-visual {\n  position: relative;\n  aspect-ratio: 1/1;\n  max-width: 420px;\n  margin-left: auto;\n}\n.logo-card {\n  position: absolute;\n  inset: 10%;\n  background: var(--white);\n  border-radius: var(--radius-lg);\n  box-shadow: var(--shadow-lg);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  padding: 18%;\n  transform: rotate(-3deg);\n  transition: transform .6s ease;\n}\n.logo-card:hover { transform: rotate(0deg) scale(1.02); }\n.logo-card img { width: 100%; height: auto; }\n\n.hero-visual { width: 100%; min-height: 280px; }\n.hero-chips {\n  position: absolute;\n  left: 0;\n  bottom: 0;\n  display: flex;\n  flex-wrap: wrap;\n  gap: 12px;\n  align-content: flex-end;\n  width: 100%;\n}\n.floating-chip {\n  display: inline-flex;\n  align-items: center;\n  background: var(--white);\n  padding: 10px 18px;\n  border-radius: 100px;\n  box-shadow: var(--shadow);\n  font-size: 0.85rem;\n  font-weight: 600;\n  color: var(--blue);\n  border: 1px solid var(--line);\n}\n.hero-chips {\n  /* default – overridden when inside .hero-visual */\n}\n\n@keyframes float {\n  0%, 100% { transform: translateY(0); }\n  50% { transform: translateY(-10px); }\n}\n\n/* =========================================\n   BUTTONS\n   ========================================= */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  padding: 14px 28px;\n  border-radius: 100px;\n  font-family: var(--font-body);\n  font-weight: 600;\n  font-size: 0.95rem;\n  cursor: pointer;\n  border: none;\n  transition: all .25s ease;\n  text-align: center;\n}\n.btn-primary {\n  background: var(--blue);\n  color: var(--white);\n  box-shadow: 0 8px 24px rgba(30, 15, 181, .28);\n}\n.btn-primary:hover {\n  background: var(--blue-deep);\n  transform: translateY(-2px);\n  box-shadow: 0 12px 32px rgba(30, 15, 181, .36);\n}\n.btn-ghost {\n  background: transparent;\n  color: var(--ink);\n  border: 1.5px solid var(--line);\n}\n.btn-ghost:hover {\n  border-color: var(--blue);\n  color: var(--blue);\n}\n.btn-full { width: 100%; }\n\n/* =========================================\n   SECTIONS\n   ========================================= */\n.section {\n  padding: 110px 0;\n}\n.section-soft { background: var(--bg-soft); }\n.section-dark {\n  background: var(--blue-dark);\n  color: var(--white);\n}\n.section-dark h1, .section-dark h2, .section-dark h3, .section-dark h4 { color: var(--white); }\n.section-dark p { color: rgba(255, 255, 255, .8); }\n\n.section-head {\n  max-width: 720px;\n  margin-bottom: 60px;\n}\n.section-head.center {\n  margin-left: auto;\n  margin-right: auto;\n  text-align: center;\n}\n.section-head.light h2, .section-head.light p { color: var(--white); }\n.section-head.light p { color: rgba(255, 255, 255, .8); }\n.section-head p {\n  font-size: 1.05rem;\n  color: var(--ink-60);\n  margin-top: 14px;\n}\n\n/* =========================================\n   GRIDS & CARDS\n   ========================================= */\n.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }\n.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }\n\n.card {\n  background: var(--white);\n  border: 1px solid var(--line);\n  border-radius: var(--radius-lg);\n  padding: 36px 30px;\n  transition: all .3s ease;\n}\n.card:hover {\n  border-color: var(--blue);\n  transform: translateY(-4px);\n  box-shadow: var(--shadow);\n}\n.card-icon {\n  font-size: 2rem;\n  color: var(--blue);\n  margin-bottom: 18px;\n  font-family: var(--font-disp);\n}\n.card h3 { margin-bottom: 12px; }\n.card p { color: var(--ink-60); font-size: 0.95rem; }\n\n/* About / values */\n.about-text p { color: rgba(255, 255, 255, .85); margin-bottom: 16px; font-size: 1.02rem; }\n.about-text strong { color: var(--white); }\n.values {\n  margin-top: 34px;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 14px;\n}\n.value {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  padding: 14px 18px;\n  background: rgba(255, 255, 255, .06);\n  border-radius: 12px;\n  border: 1px solid rgba(255, 255, 255, .1);\n  font-size: 0.95rem;\n  color: var(--white);\n  font-weight: 500;\n}\n.value span {\n  font-family: var(--font-disp);\n  color: #9D94FF;\n  font-size: 0.85rem;\n  font-weight: 700;\n}\n\n/* =========================================\n   SERVICES GRID\n   ========================================= */\n.services-grid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 20px;\n}\n.service {\n  background: var(--white);\n  border: 1px solid var(--line);\n  border-radius: var(--radius-lg);\n  padding: 32px 26px;\n  position: relative;\n  transition: all .3s ease;\n  min-height: 230px;\n  display: flex;\n  flex-dire onsultoría Adaptativa Pymes<\u002Fem>\n      <\u002Fspan>\n    <\u002Fa>\n    <nav class=\"nav-links\" id=\"navLinks\">\n      <a href=\"#inicio\">Inicio<\u002Fa>\n      <a href=\"#nosotros\">Nosotros<\u002Fa>\n      <a href=\"#servicios\">Servicios<\u002Fa>\n      <a href=\"#ia\">IA<\u002Fa>\n      <a href=\"#equipo\">Equipo<\u002Fa>\n      <a href=\"#casos\">Casos<\u002Fa>\n      <a href=\"#contacto\" class=\"nav-cta\">Agenda llamada<\u002Fa>\n    <\u002Fnav>\n    <button class=\"nav-toggle\" aria-label=\"Menú\" onclick=\"document.getElementById('navLinks').classList.toggle('open')\">\n      <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- =========== HERO =========== -->\n<section id=\"inicio\" class=\"hero\">\n  <div class=\"hero-bg\"><\u002Fdiv>\n  <div class=\"container hero-inner\">\n    <div class=\"hero-text\">\n      <span class=\"eyebrow\">Consultoría Adaptativa Pymes<\u002Fspan>\n      <h1>Consultoría que <span class=\"accent\">se adapta<\u002Fspan><br>a tu empresa.<\u002Fh1>\n      <p class=\"lead\">Acompañamos a pymes, microempresas y startups en su crecimiento con soluciones personalizadas y automatización inteligente — siempre con criterio humano detrás.<\u002Fp>\n      <div class=\"hero-ctas\">\n        <a href=\"#contacto\" class=\"btn btn-primary\">Agenda una llamada gratuita<\u002Fa>\n        <a href=\"#servicios\" class=\"btn btn-ghost\">Cómo trabajamos →<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"hero-stats\">\n        <div><strong>+ tiempo<\u002Fstrong><span>tiempo ahorrado en tareas operativas<\u002Fspan><\u002Fdiv>\n        <div><strong>100%<\u002Fstrong><span>soluciones personalizadas<\u002Fspan><\u002Fdiv>\n        <div><strong>1:1<\u002Fstrong><span>acompañamiento humano real<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-visual\">\n      <div class=\"hero-chips\">\n        <span class=\"floating-chip\">Automatización con IA<\u002Fspan>\n        <span class=\"floating-chip\">Estrategia humana<\u002Fspan>\n        <span class=\"floating-chip\">A medida<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"logo-card\" style=\"width: 0px; height: 0px; padding: 0px\">\n        <img src=\"f7e50216-75ba-45cf-8c31-7d864f6ed071\" alt=\"CAP\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========== PARA QUIÉN =========== -->\n<section class=\"section\" id=\"para-quien\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <span class=\"eyebrow\">Para quién trabajamos<\u002Fspan>\n      <h2>Negocios con grandes ambiciones<\u002Fh2>\n      <p>No somos una consultora de grandes corporaciones. Trabajamos con quienes más pueden ganar: empresas pequeñas que quieren crecer sin ahogarse en tareas operativas.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"grid-3\">\n      <div class=\"card\">\n        <div class=\"card-icon\">◢<\u002Fdiv>\n        <h3>Pymes en crecimiento<\u002Fh3>\n        <p>Equipos que ya funcionan pero necesitan orden, automatización y estrategia para escalar sin romperse.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-icon\">◆<\u002Fdiv>\n        <h3>Microempresas<\u002Fh3>\n        <p>Negocios pequeños donde cada hora cuenta. Les devolvemos tiempo y les damos herramientas de grandes empresas.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-icon\">▲<\u002Fdiv>\n        <h3>Startups y nuevos negocios<\u002Fh3>\n        <p>Proyectos recientes con potencial de crecer rápido. Montamos los cimientos para que el despegue sea sólido.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========== NOSOTROS =========== -->\n<section class=\"section section-dark\" id=\"nosotros\">\n  <div class=\"container\">\n    <div class=\"grid-2\">\n      <div>\n        <span class=\"eyebrow light\">Sobre nosotros<\u002Fspan>\n        <h2>Un equipo real, cercano, implicado con tu negocio.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"about-text\">\n        <p>Creemos que la consultoría de calidad no debería ser privilegio de grandes empresas. Por eso creamos <strong>CAP — Consultoría Adaptativa Pymes<\u002Fstrong>: un equipo humano que se sienta contigo, entiende tu negocio a fondo y diseña soluciones a tu medida.<\u002Fp>\n        <p>Trabajamos en corto, con criterio estratégico y herramientas inteligentes que ahorran tiempo y dinero de verdad.<\u002Fp>\n        <div class=\"values\">\n          <div class=\"value\"><span>01<\u002Fspan>Cercanía y compromiso real<\u002Fdiv>\n          <div class=\"value\"><span>02<\u002Fspan>Personalización total<\u002Fdiv>\n          <div class=\"value\"><span>03<\u002Fspan>Criterio estratégico<\u002Fdiv>\n          <div class=\"value\"><span>04<\u002Fspan>Resultados medibles<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========== SERVICIOS =========== -->\n<section class=\"section\" id=\"servicios\">\n  <div class=\"container\">\n    <div class=\"section-head center\">\n      <span class=\"eyebrow\">Servicios<\u002Fspan>\n      <h2>Todo lo que tu negocio necesita,<br>adaptado a tu realidad.<\u002Fh2>\n      <p>Cada servicio se diseña a medida. Elige lo que necesitas hoy y escala cuando tu negocio lo pida.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"services-grid\">\n      <article class=\"service\">\n        <div class=\"service-num\">01<\u002Fdiv>\n        <h3>Branding<\u002Fh3>\n        <p>Identidad visual, naming y posicionamiento. Una marca que transmita quién eres y conecte con tu cliente ideal.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"service\">\n        <div class=\"service-num\">02<\u002Fdiv>\n        <h3>Marketing Digital<\u002Fh3>\n        <p>Estrategia, campañas y analítica. Llegar a quien te compra, medir lo que funciona, repetirlo.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"service\">\n        <div class=\"service-num\">03<\u002Fdiv>\n        <h3>Creación de Contenido<\u002Fh3>\n        <p>Textos, redes sociales, vídeo y SEO. Contenido útil y constante, sin depender de inspiración.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"service\">\n        <div class=\"service-num\">04<\u002Fdiv>\n        <h3>Captación de Clientes<\u002Fh3>\n        <p>Embudos, prospección y conversión. Un sistema predecible que te trae clientes todos los meses.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"service\">\n        <div class=\"service-num\">05<\u002Fdiv>\n        <h3>Finanzas y Administración<\u002Fh3>\n        <p>Contabilidad, facturación, nóminas y previsión. Menos errores, más control, mejores decisiones.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"service\">\n        <div class=\"service-num\">06<\u002Fdiv>\n        <h3>Análisis de Datos<\u002Fh3>\n        <p>Interpretamos tus datos para detectar patrones, anticipar tendencias y encontrar oportunidades.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"service\">\n        <div class=\"service-num\">07<\u002Fdiv>\n        <h3>Recursos Humanos<\u002Fh3>\n        <p>Selección, evaluación y gestión del talento. Equipos más productivos con procesos más justos.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"service featured\">\n        <div class=\"service-num\">08<\u002Fdiv>\n        <h3>Automatización con IA<\u002Fh3>\n        <p>La joya de la corona. Automatizamos lo tedioso para que tu equipo se dedique a lo importante.<\u002Fp>\n        <a href=\"#ia\" class=\"service-link\">Descubre cómo →<\u002Fa>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n    <aside class=\"services-doc\">\n      <div class=\"services-doc-icon\" aria-hidden=\"true\">\n        <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <path d=\"M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z\"><\u002Fpath>\n          <polyline points=\"14 3 14 9 20 9\"><\u002Fpolyline>\n          <line x1=\"8\" y1=\"13\" x2=\"16\" y2=\"13\"><\u002Fline>\n          <line x1=\"8\" y1=\"17\" x2=\"13\" y2=\"17\"><\u002Fline>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"services-doc-text\">\n        <h3>Explora en detalle nuestros servicios<\u002Fh3>\n        <p>Descarga el documento completo con el alcance, metodología y entregables de cada uno de nuestros servicios.<\u002Fp>\n      <\u002Fdiv>\n      <a href=\"https://drive.google.com/file/d/1w6Wm39e4Kgtg8uGm9mJUYvmaYoJ434Zi/view?usp=sharing\" target=\"_blank\" rel=\"noopener\" class=\"btn btn-primary services-doc-btn\">\n        Ver documento (PDF) →\n      <\u002Fa>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========== IA =========== -->\n<section class=\"section section-ia\" id=\"ia\">\n  <div class=\"container\">\n    <div class=\"section-head center light\">\n      <span class=\"eyebrow light\">Automatización con IA<\u002Fspan>\n      <h2>IA con criterio humano detrás.<\u002Fh2>\n      <p>La inteligencia artificial automatiza lo repetitivo. Nuestro equipo aporta la estrategia, la supervisión y el sentido común para que la tecnología trabaje a favor de tu negocio.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"ia-philosophy\">\n      <div class=\"phi\">\n        <div class=\"phi-icon\">◉<\u002Fdiv>\n        <h4>Criterio estratégico<\u002Fh4>\n        <p>No automatizamos por automatizar. Priorizamos lo que ahorra tiempo y dinero real.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"phi\">\n        <div class=\"phi-icon\">◎<\u002Fdiv>\n        <h4>Supervisión humana<\u002Fh4>\n        <p>Cada automatización pasa por revisión constante. La IA asiste, las personas deciden.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"phi\">\n        <div class=\"phi-icon\">◈<\u002Fdiv>\n        <h4>Adaptación total<\u002Fh4>\n        <p>Cada negocio es distinto. Adaptamos tamaño, complejidad y alcance a tu momento.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"ia-no\">\n      <h4>Qué <u>no<\u002Fu> hacemos<\u002Fh4>\n      <p>No sustituimos a tu equipo. No complicamos lo que ya funciona. No añadimos automatizaciones inecesarias.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========== EQUIPO =========== -->\n<section class=\"section\" id=\"equipo\">\n  <div class=\"container\">\n    <div class=\"section-head center\">\n      <span class=\"eyebrow\">Nuestro equipo<\u002Fspan>\n      <h2>Personas reales detrás de cada proyecto.<\u002Fh2>\n      <p>Un equipo humano, cercano y con experiencia. Nuestro equipo de ingenieros y especialistas en consultoría de Fiverr se encarga de ofrecer los mejores resultados.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"team-grid\">\n      <div class=\"team-card\">\n        <div class=\"team-photo\"><img src=\"68e35b56-a7d8-4555-b6c3-e85a863bc9c7\" alt=\"Wei/Juan\"><\u002Fdiv>\n        <h4>Wei/Juan<\u002Fh4>\n        <span class=\"role\">Contabilidad<\u002Fspan>\n        <p>\"Me ocupo de la gestión contable y de los aspectos legales, con especialización en Derecho español.\"<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"team-card\">\n        <div class=\"team-photo\"><img src=\"64368c2f-7b47-46b7-9e29-62a1e8cf4cc9\" alt=\"Jun\"><\u002Fdiv>\n        <h4>Jun<\u002Fh4>\n        <span class=\"role\">Director de Marketing y Creación de contenido<\u002Fspan>\n        <p>\"Creo en el marketing honesto: medir, ajustar y repetir lo que funciona.\"<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"team-card\">\n        <div class=\"team-photo\"><img src=\"484d6e08-8abc-44af-a8cc-0d4123cf7472\" alt=\"Anaya\"><\u002Fdiv>\n        <h4>Anaya<\u002Fh4>\n        <span class=\"role\">Lead de Automatización e IA<\u002Fspan>\n        <p>\"Automatizo lo aburrido para que tu equipo se dedique a lo que realmente importa: pensar y vender.\"<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"team-card\">\n        <div class=\"team-photo\"><img src=\"56ceb9e3-a859-423c-beb1-ccb9baeb70e5\" alt=\"Ishita\"><\u002Fdiv>\n        <h4>Ishita<\u002Fh4>\n        <span class=\"role\">Especialista en Datos y Excel<\u002Fspan>\n        <p>\"Los números cuentan historias. Mi trabajo es traducirlas en decisiones que hagan crecer tu negocio.\"<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"team-footer\">\n      <p><strong>Equipo de Ayuda a la Consultoría junto a Fiverr.<\u002Fstrong> Colaboramos con una red de especialistas verificados para reforzar cualquier proyecto con el perfil exacto que necesita.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========== CASOS =========== -->\n<section class=\"section section-soft\" id=\"casos\">\n  <div class=\"container\">\n    <div class=\"section-head center\">\n      <span class=\"eyebrow\">Casos y clientes<\u002Fspan>\n      <h2>Proyectos reales, resultados reales.<\u002Fh2>\n      <p>Empresas que han confiado en CAP para automatizar sus procesos y ganar eficiencia operativa real.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"cases-grid\">\n      <article class=\"case-card\">\n        <div class=\"case-logo case-logo-dark\">\n          <img src=\"4c10dd84-6504-43ee-99c1-0be908bf1032\" alt=\"Centre Fujifilm Balmes\">\n        <\u002Fdiv>\n        <div class=\"case-body\">\n          <span class=\"case-tag\">Retail · Fotografía<\u002Fspan>\n          <h3>Centre Fujifilm Balmes<\u002Fh3>\n          <p class=\"case-desc\">Tienda de fotografía con un volumen elevado de referencias y operativa contable diaria. Trabajamos en la <strong>automatización de la contabilidad<\u002Fstrong> y la <strong>gestión de stock<\u002Fstrong>.<\u002Fp>\n          <ul class=\"case-results\">\n            <li><span>◆<\u002Fspan>Procesos contables automatizados de extremo a extremo<\u002Fli>\n            <li><span>◆<\u002Fspan>Control de stock estable, sin errores manuales<\u002Fli>\n            <li><span>◆<\u002Fspan>Funcionamiento eficiente y optimizado<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"case-card\">\n        <div class=\"case-logo\">\n          <img src=\"2fd0dd24-7236-4f1e-a0fa-feb778c59a5d\" alt=\"Autoescuela Prado\">\n        <\u002Fdiv>\n        <div class=\"case-body\">\n          <span class=\"case-tag\">Formación · Movilidad<\u002Fspan>\n          <h3>Autoescuela Prado<\u002Fh3>\n          <p class=\"case-desc\">Autoescuela con flujo constante de leads y procesos internos de equipo. Optimizamos el <strong>Lead Management<\u002Fstrong> y los procesos de <strong>RRHH<\u002Fstrong>.<\u002Fp>\n          <ul class=\"case-results\">\n            <li><span>◆<\u002Fspan>Captación y seguimiento de leads automatizados<\u002Fli>\n            <li><span>◆<\u002Fspan>Procesos de RRHH ágiles y trazables<\u002Fli>\n            <li><span>◆<\u002Fspan>Operativa estable y escalable<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n    <div class=\"cta-inline\">\n      <a href=\"#contacto\" class=\"btn btn-primary\">Quiero ser el próximo caso de éxito<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========== CONTACTO =========== -->\n<section class=\"section section-dark\" id=\"contacto\">\n  <div class=\"container\">\n    <div class=\"grid-2\">\n      <div>\n        <span class=\"eyebrow light\">Contacto<\u002Fspan>\n        <h2>Hablemos de tu negocio.<\u002Fh2>\n        <p>Una primera llamada de 30 minutos, sin compromiso. Escuchamos, entendemos y te decimos si podemos ayudarte de verdad.<\u002Fp>\n        <ul class=\"contact-list\">\n          <li><span>✉<\u002Fspan>contact@capconsultor.eu<\u002Fli>\n          <li><span>☎<\u002Fspan>+34 660 380 592<\u002Fli>\n          <li><span>◉<\u002Fspan>Barcelona · España<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <form class=\"contact-form\" onsubmit=\"event.preventDefault(); alert('¡Gracias! Te contactaremos en breve.');\">\n        <label>Nombre\n          <input type=\"text\" required=\"\" placeholder=\"Tu nombre\">\n        <\u002Flabel>\n        <label>Empresa\n          <input type=\"text\" placeholder=\"Nombre de tu empresa\">\n        <\u002Flabel>\n        <label>Email\n          <input type=\"email\" required=\"\" placeholder=\"tu@email.com\">\n        <\u002Flabel>\n        <label>¿En qué podemos ayudarte?\n          <textarea rows=\"4\" placeholder=\"Cuéntanos brevemente...\"><\u002Ftextarea>\n        <\u002Flabel>\n        <button type=\"submit\" class=\"btn btn-primary btn-full\">Enviar mensaje<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- =========== FOOTER =========== -->\n<footer class=\"footer\">\n  <div class=\"container footer-inner\">\n    <div class=\"footer-brand\">\n      <img src=\"f7e50216-75ba-45cf-8c31-7d864f6ed071\" alt=\"CAP\" style=\"border-radius: 0px\">\n      <div>\n        <strong>CAP<\u002Fstrong>\n        <span>Consultoría Adaptativa Pymes<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer-cols\">\n      <div>\n        <h6>Navegación<\u002Fh6>\n        <a href=\"#inicio\">Inicio<\u002Fa>\n        <a href=\"#nosotros\">Nosotros<\u002Fa>\n        <a href=\"#servicios\">Servicios<\u002Fa>\n        <a href=\"#ia\">IA<\u002Fa>\n      <\u002Fdiv>\n      <div>\n        <h6>Empresa<\u002Fh6>\n        <a href=\"#equipo\">Equipo<\u002Fa>\n        <a href=\"#casos\">Casos<\u002Fa>\n        <a href=\"#contacto\">Contacto<\u002Fa>\n      <\u002Fdiv>\n      <div>\n        <h6>Legal<\u002Fh6>\n        <a href=\"#\">Aviso legal<\u002Fa>\n        <a href=\"#\">Privacidad<\u002Fa>\n        <a href=\"#\">Cookies<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"footer-bottom\">\n    <div class=\"container\">\n      <span>© 2026 CAP — Consultoría Adaptativa Pymes. Todos los derechos reservados.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<scr
